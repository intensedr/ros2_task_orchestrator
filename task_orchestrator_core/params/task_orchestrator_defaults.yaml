task_orchestrator:
  ros__parameters:
    api_version: "v1"
    enable_compatibility_aliases: false
    enable_debug_task_servers: false
    event_record_limit: 1000
    task_record_limit: 1000
    tasks_config_path: ""
    mission_templates_path: ""
    queue:
      max_size: 100
      poll_interval_sec: 0.05
    agents:
      default_heartbeat_timeout_sec: 30.0
    missions:
      default_lease_duration_sec: 120.0
    tasks: []
    storage:
      enabled: false
      sqlite_path: ""
      retention_days: 30
